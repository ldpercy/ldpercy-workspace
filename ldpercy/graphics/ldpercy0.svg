<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64" width="100%" height="100%">
	<style>
		polygon {

			stroke-width:1;
		}


		.hands {
			stroke-width:1;
			fill:salmon;
			stroke:pink;
		}
		.green {
			fill:limegreen;
			stroke:darkgreen;
		}
		.silver {
			fill:silver;
			stroke:grey;
		}
		.eyes circle{
			r:4px;
			stroke-width:2;
			fill:dimgrey;
			stroke:whitesmoke;
		}
	</style>





	<rect x="-32" y="-32" width="64" height="64" style="fill:darkslategray"/>



	<g class="hands">

		<rect x="-4" y="0" width="4" height="16"/>
		<rect x="-8" y="0" width="4" height="16"/>
		<rect x="-12" y="0" width="4" height="16"/>
		<rect x="-16" y="0" width="4" height="16"/>
		<polygon points="-16,0 -32,0 -16,16"/>


		<rect x="0" y="0" width="4" height="16"/>
		<rect x="4" y="0" width="4" height="16"/>
		<rect x="8" y="0" width="4" height="16"/>
		<rect x="12" y="0" width="4" height="16"/>
		<polygon points="16,0 32,0 16,16"/>
	</g>
	<g class="green">
		<polygon points="0,-16 16,0 -16,0"/>
	</g>

	<g class="silver">
		<polygon points="-32,32 -16,16 16,16 32,32"/>
	</g>


	<g class="eyes">
		<circle cx="-4" cy="-24"/>
		<circle cx="4" cy="-24"/>

		<circle cx="-16" cy="-24"/>
		<circle cx="-24" cy="-24"/>

		<circle cx="16" cy="-24"/>
		<circle cx="24" cy="-24"/>

	</g>


</svg>
